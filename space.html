<html>

<head>
    <title>Solar System</title>

    <style>
        body {
            background-color: black;
        }

        #main {
            display: block;
            width: 75%;
            height: 75%;
            margin-left: auto;
            margin-right: auto;
            padding: 15px;
            border: 5px solid white;
            border-radius: 20px;
            background-image: url ("space.jpeg");
            margin-top: 50px;
        }

        img {
            width: 100%;
            height: 100%;
        }

        .planets {
            width: 12%;
            height: 10%;
            display: block;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;

        }

        #venus {
            width: 15%;
        }

        #details {
            width: 25%;
            height: 24%;
            color: white;
            background-color: black;
            border: 3px solid white;
            border-radius: 20px;
            display: none;
            margin-left: auto;
            margin-right: auto;
            margin-top: 50px;
            position: fixed;
            top: 100px;
            right: 250px;
            padding: 5px;



        }

        #info {
            width: 25%;
            height: 25%;
            color: white;
            background-color: black;
            border: 3px solid white;
            border-radius: 20px;
            display: none;
            margin-left: auto;
            margin-right: auto;
            margin-top: 50px;
            position: fixed;
            top: 350px;
            right: 250px;
            padding: 5px;
            text-align: justify;

        }
    </style>
    <script>
        var names = ["mercury ", "venus", "earth", "mars", "jupiter", "saturn", "uranus", "neptune"];
        var circrumfrence = ["15329km ", "38025km ", "40075km ", "21266km ", "439267km ", "378293km ", "232730km ", "227760km "];
        var distancefromsun = ["57.9 million km ", "108.2 million km ", "149.6 million km ", "227.9 million km ", "778.5 million km ", "1433.5 million km ", "2872.5 million km ", "4495.1 million km "];
        var info = ["Mercury is the smallest planet in our solar system and the closest to the Sun orbiting it every 88 Earth days. It is a rocky, cratered world, similar in appearance to Earth's Moon, with extreme temperature swings from 430°C in the day to -180°C at night. It has no significant atmosphere and is the fastest planet in the solar system.", "Venus is the second planet from the Sun and Earth's closest, similarly sized neighbor, often called its twin. It is the hottest planet in the Solar System—with surface temperatures around —due to a thick toxic carbon dioxide atmosphere and sulfuric acid clouds. Venus rotates backwards and extremely slowly, meaning its day lasts longer than its year.", "Earth is the third planet from the Sun and the only known place in the universe to harbor life. It has a diverse climate and geography, with 70% of its surface covered by water. Earth's atmosphere is rich in nitrogen and oxygen, supporting a wide variety of ecosystems. It has one natural satellite, the Moon, which influences tides and stabilizes Earth's axial tilt.", "Mars is the fourth planet from the Sun and is often called the 'Red Planet' due to its reddish appearance caused by iron oxide on its surface. It has a thin atmosphere primarily composed of carbon dioxide and experiences seasonal changes similar to Earth.", "Jupiter is the largest planet in our solar system and is a gas giant with a prominent Great Red Spot storm. It has at least 79 moons and a faint ring system.", "Saturn is known for its spectacular ring system made of ice and rock particles. It is also a gas giant with many moons, including Titan, which has a thick atmosphere.", "Uranus is an ice giant with a unique sideways rotation axis, making it appear to roll on its side as it orbits the Sun. It has a blue-green color due to methane in its atmosphere.", "Neptune is the farthest planet from the Sun and is also an ice giant with strong winds reaching speeds of over 2,000 km/h."]
        function showDetails(planetNumber) {
            var details = document.getElementById("details");
            details.style.display = "block";
            details.innerHTML = "<h2>" + "name: " + names[planetNumber] + "</h2>" +
                "<h2>" + "circumference: " + circrumfrence[planetNumber] + "</h2>" +
                "<h2>" + "distance from sun: " + distancefromsun[planetNumber] + "</h2>";
            var infobox = document.getElementById("info");
            infobox.style.display = "block";
            infobox.innerHTML = "<p>" + info[planetNumber] + "</p>";

        }


    </script>
</head>

<body>
    <div id="main">
        <div id="mercury" class="planets" onclick="showDetails(0)">
            <img src="mercury.jpeg">

        </div>
        <div id="venus" class="planets" onclick="showDetails(1)">
            <img src="venus.jpg">
        </div>
        <div id="earth" class="planets" onclick="showDetails(2)">
            <img src="earth.jpeg">

        </div>
        <div id="mars" class="planets" onclick="showDetails(3)">
            <img src="mars.jpeg">
        </div>
        <div id="jupiter" class="planets" onclick="showDetails(4)">
            <img src="jupiter.jpeg">

        </div>
        <div id="saturn" class="planets" onclick="showDetails(5)">
            <img src="saturn.jpeg">
        </div>

        <div id="uranus" class="planets" onclick="showDetails(6)">
            <img src="uranus.jpeg">
        </div>

        <div id="neptune" class="planets" onclick="showDetails(7)">
            <img src="neptune.jpeg">
        </div>







    </div>
    <div id="details">



    </div>
    <div id="info">

    </div>
</body>

</html>
