<html>

<head>
    <title>Solar System</title>

    <style>
        body {
            background-color: black;
        }

        #main {
            display: block;
            width: 75%;
            height: 75%;
            margin-left: auto;
            margin-right: auto;
            padding: 15px;
            border: 5px solid white;
            border-radius: 20px;
            background-image: url("galaxy.jpg");
            margin-top: 50px;
        }

        img {
            width: 100%;
            height: 100%;
        }

        .planets {
            width: 12%;
            height: 10%;
            display: block;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;

        }

        #venus {
            width: 15%;
        }

        #details {
            width: 25%;
            height: 24%;
            color: white;
            background-color: black;
            border: 3px solid white;
            border-radius: 20px;
            display: none;
            margin-left: auto;
            margin-right: auto;
            margin-top: 50px;
            position: fixed;
            left: 250px;
            top: 150px;




        }
    </style>
    <script>
        function showDetails(planet) {
            var details = document.getElementById("details");
            details.style.display = "block";
            details.innerHTML = "<h2>" + planet + "</h2><p>Details about " + planet + " will go here.</p>";
        }


    </script>
</head>

<body>
    <div id="main">
        <div id="mercury" class="planets" onclick="showDetails('mercury')">
            <img src="mercury.jpeg">

        </div>
        <div id="venus" class="planets" onclick="showDetails('venus')">
            <img src="venus.jpg">
        </div>
        <div id="earth" class="planets" onclick="showDetails('earth')">
            <img src="earth.jpeg">

        </div>





    </div>
    <div id="details">


    </div>
</body>

</html>
